<!DOCTYPE html>
<html>
<html lang="tr"> <!-- Geçerli sayfa dili -->
<head>
	<meta charset="utf-8">
	<meta http-equiv="x-ua-compatible" content="ie=edge"><!-- Internet Explorer için son motoru kullanma -->
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<meta name="description" content="150 Karakterden az olacak site açıklaması">
	
	<title>Basit HTML5</title>

	<meta name="robots" content="index,follow"><!-- Tüm arama motorları-->
	<meta name="googlebot" content="index,follow"><!-- Google Benzersiz -->
	
	<link rel="stylesheet" href="custom.css"><!-- Dışarıdan css dosyası dahil etme -->
	<link rel="icon" type="image/x-icon" href="https://www.ehliman.net/favicon.ico">

	<meta name="google" content="notranslate"><!-- Google bu dökümanı çevirmesin -->

	<!-- Site sahipliği doğrulama -->
	<meta name="google-site-verification" content="verification_token"><!-- Google Search Console -->
	<meta name="yandex-verification" content="verification_token"><!-- Yandex Webmasters -->
	<meta name="msvalidate.01" content="verification_token"><!-- Bing Webmaster Center -->
	<meta name="alexaVerifyID" content="verification_token"><!-- Alexa Console -->
	<meta name="p:domain_verify" content="code_from_pinterest"><!-- Pinterest Console-->
	<meta name="norton-safeweb-site-verification" content="norton_code"><!-- Norton Safe Web -->

	<!-- Tanımlama amacıyla client tarafında çerez bırakır -->
	<meta http-equiv="set-cookie" content="name=value; expires=date; path=url">

	<!-- Facebook -->
	<meta property="og:type" content="website">
	<meta property="og:url" content="https://example.com/page.html">
	<meta property="og:title" content="Content Title">
	<meta property="og:image" content="https://example.com/image.jpg">
	<meta property="og:description" content="Description Here">
	<meta property="og:site_name" content="Site Name">
	<meta property="og:locale" content="en_US">
	<meta property="og:image:width" content="1200"><!-- Opsiyoneldir fakat önerilir -->
	<meta property="og:image:height" content="630"><!-- Opsiyoneldir fakat önerilir -->

	<!-- Twitter -->
	<meta name="twitter:card" content="summary">
	<meta name="twitter:site" content="@site_account">
	<meta name="twitter:creator" content="@individual_account">
	<meta name="twitter:url" content="https://example.com/page.html">
	<meta name="twitter:title" content="Content Title">
	<meta name="twitter:description" content="Content description less than 200 characters">
	<meta name="twitter:image" content="https://example.com/image.jpg">
	
	<script src="script.js"></script>
	<script>
  		// Javascript fonksiyonları
	</script>
</head>
<body>

</body>
</html>
